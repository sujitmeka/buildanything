version: 1
source_prose: agents/<name>.md frontmatter + Skill Access section
phase_graph: docs/migration/phase-graph.yaml
generator: eval/generate_agent_registry.py
policy: Agent prompt files are source of truth for name/tools/model/description/skills. phase-graph.yaml is source of truth
  for phase_usage/dispatch_modes/artifacts_written. Hand overrides for utility agents live in eval/calibration.json under
  'agent_registry_overrides'. Regenerate via `python eval/generate_agent_registry.py`; lint with `--check`.
