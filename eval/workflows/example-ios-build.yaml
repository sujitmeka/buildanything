# Mock workflow spec for simulate.py.
# Each phase = one agent invocation with tool calls.
# Edit to mirror a real /buildanything:build run.

name: ios-build-example
model: opus
phases:
  - name: planning
    agent: agents/planner.md
    skills:
      - skills/ios/app-store-connect
    tools:
      Read: 8
      Grep: 4
      Write: 2
    turns: 6

  - name: architecture
    agent: agents/ios-swift-architect.md
    skills: []
    tools:
      Read: 15
      Grep: 6
      Glob: 3
    turns: 10

  - name: implementation
    agent: agents/engineering-senior-developer.md
    skills: []
    tools:
      Read: 25
      Edit: 20
      Write: 8
      Bash: 10
    turns: 30

  - name: review
    agent: agents/code-reviewer.md
    skills: []
    tools:
      Read: 12
      Grep: 5
    turns: 8
